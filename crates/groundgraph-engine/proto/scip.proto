// SCIP (Source Code Intelligence Protocol) protobuf schema.
//
// Vendored verbatim from the official SCIP repository at tag v0.8.1 — the exact
// schema the `scip` 0.8.1 crate (formerly on the runtime `protobuf` crate) was
// generated from (issues.md #229). We compile this with prost-build instead of
// depending on the `scip` + `protobuf` crates, so we drop the full Google
// protobuf runtime reflection for a code-generated, build-time-only decoder.
//
// Source: https://github.com/sourcegraph/scip/blob/v0.8.1/scip.proto
// (Apache-2.0). Field numbers are part of the wire-format contract and must not
// be edited — real `.scip` files in the wild (rust-analyzer, scip-go, …) are
// encoded against these exact tags.

syntax = "proto3";

package scip;

option go_package = "github.com/scip-code/scip/bindings/go/scip/";
option java_multiple_files = true;
option java_outer_classname = "ScipProto";
option java_package = "org.scip_code.scip";

// Index represents a complete SCIP index for a workspace this is rooted at a
// single directory. An Index message payload can have a large memory footprint
// and it's therefore recommended to emit and consume an Index payload one field
// value at a time. To permit streaming consumption of an Index payload, the
// `metadata` field must appear at the start of the stream and must only appear
// once in the stream. Other field values may appear in any order.
message Index {
  // Metadata about this index.
  Metadata metadata = 1;
  // Documents that belong to this index.
  repeated Document documents = 2;
  // (optional) Symbols that are referenced from this index but are defined in
  // an external package (a separate `Index` message). Leave this field empty
  // if you assume the external package will get indexed separately. If the
  // external package won't get indexed for some reason then you can use this
  // field to provide hover documentation for those external symbols.
  repeated SymbolInformation external_symbols = 3;
}

message Metadata {
  // Which version of this protocol was used to generate this index?
  ProtocolVersion version = 1;
  // Information about the tool that produced this index.
  ToolInfo tool_info = 2;
  // URI-encoded absolute path to the root directory of this index. All
  // documents in this index must appear in a subdirectory of this root
  // directory.
  string project_root = 3;
  // Text encoding of the source files on disk that are referenced from
  // `Document.relative_path`. This value is unrelated to the `Document.text`
  // field, which is a Protobuf string and hence must be UTF-8 encoded.
  TextEncoding text_document_encoding = 4;
}

enum ProtocolVersion {
  UnspecifiedProtocolVersion = 0;
}

enum TextEncoding {
  UnspecifiedTextEncoding = 0;
  UTF8 = 1;
  UTF16 = 2;
}

message ToolInfo {
  // Name of the indexer that produced this index.
  string name = 1;
  // Version of the indexer that produced this index.
  string version = 2;
  // Command-line arguments that were used to invoke this indexer.
  repeated string arguments = 3;
}

// Document defines the metadata about a source file on disk.
message Document {
  // The string ID for the programming language this file is written in.
  string language = 4;
  // (Required) Unique path to the text document, relative to
  // `Metadata.project_root`, using '/' as the separator.
  string relative_path = 1;
  // Occurrences that appear in this file.
  repeated Occurrence occurrences = 2;
  // Symbols that are "defined" within this document.
  repeated SymbolInformation symbols = 3;

  // (optional) Text contents of this document. Indexers are not expected to
  // include the text by default.
  string text = 5;

  // Specifies the encoding used for source ranges in this Document.
  PositionEncoding position_encoding = 6;
}

// Encoding used to interpret the 'character' value in source ranges.
enum PositionEncoding {
  UnspecifiedPositionEncoding = 0;
  UTF8CodeUnitOffsetFromLineStart = 1;
  UTF16CodeUnitOffsetFromLineStart = 2;
  UTF32CodeUnitOffsetFromLineStart = 3;
}

message Symbol {
  string scheme = 1;
  Package package = 2;
  repeated Descriptor descriptors = 3;
}

message Package {
  string manager = 1;
  string name = 2;
  string version = 3;
}

message Descriptor {
  enum Suffix {
    option allow_alias = true;
    UnspecifiedSuffix = 0;
    Namespace = 1;
    Package = 1 [deprecated = true];
    Type = 2;
    Term = 3;
    Method = 4;
    TypeParameter = 5;
    Parameter = 6;
    Meta = 7;
    Local = 8;
    Macro = 9;
  }
  string name = 1;
  string disambiguator = 2;
  Suffix suffix = 3;
}

// Signature represents the signature of a symbol as it's displayed in API
// documentation or hover tooltips. Uses a subset of Document's fields with the
// same field numbers for wire compatibility with older indexes.
message Signature {
  string language = 4;
  string text = 5;
  repeated Occurrence occurrences = 2;
  reserved 1, 3, 6;
}

message SymbolInformation {
  string symbol = 1;
  repeated string documentation = 3;
  repeated Relationship relationships = 4;
  Kind kind = 5;
  enum Kind {
    UnspecifiedKind = 0;
    AbstractMethod = 66;
    Accessor = 72;
    Array = 1;
    Assertion = 2;
    AssociatedType = 3;
    Attribute = 4;
    Axiom = 5;
    Boolean = 6;
    Class = 7;
    Concept = 86;
    Constant = 8;
    Constructor = 9;
    Contract = 62;
    DataFamily = 10;
    Delegate = 73;
    Enum = 11;
    EnumMember = 12;
    Error = 63;
    Event = 13;
    Extension = 84;
    Fact = 14;
    Field = 15;
    File = 16;
    Function = 17;
    Getter = 18;
    Grammar = 19;
    Instance = 20;
    Interface = 21;
    Key = 22;
    Lang = 23;
    Lemma = 24;
    Library = 64;
    Macro = 25;
    Message = 28;
    Method = 26;
    MethodAlias = 74;
    MethodReceiver = 27;
    MethodSpecification = 67;
    Mixin = 85;
    Modifier = 65;
    Module = 29;
    Namespace = 30;
    Null = 31;
    Number = 32;
    Object = 33;
    Operator = 34;
    Package = 35;
    PackageObject = 36;
    Parameter = 37;
    ParameterLabel = 38;
    Pattern = 39;
    Predicate = 40;
    Property = 41;
    Protocol = 42;
    ProtocolMethod = 68;
    PureVirtualMethod = 69;
    Quasiquoter = 43;
    SelfParameter = 44;
    Setter = 45;
    Signature = 46;
    SingletonClass = 75;
    SingletonMethod = 76;
    StaticDataMember = 77;
    StaticEvent = 78;
    StaticField = 79;
    StaticMethod = 80;
    StaticProperty = 81;
    StaticVariable = 82;
    String = 48;
    Struct = 49;
    Subscript = 47;
    Tactic = 50;
    Theorem = 51;
    ThisParameter = 52;
    Trait = 53;
    TraitMethod = 70;
    Type = 54;
    TypeAlias = 55;
    TypeClass = 56;
    TypeClassMethod = 71;
    TypeFamily = 57;
    TypeParameter = 58;
    Union = 59;
    Value = 60;
    Variable = 61;
  }
  string display_name = 6;
  Signature signature_documentation = 7;
  string enclosing_symbol = 8;
}

message Relationship {
  string symbol = 1;
  bool is_reference = 2;
  bool is_implementation = 3;
  bool is_type_definition = 4;
  bool is_definition = 5;
}

// SymbolRole declares what "role" a symbol has in an occurrence. Encoded as a
// bitset where each bit represents a different role.
enum SymbolRole {
  UnspecifiedSymbolRole = 0;
  Definition = 0x1;
  Import = 0x2;
  WriteAccess = 0x4;
  ReadAccess = 0x8;
  Generated = 0x10;
  Test = 0x20;
  ForwardDefinition = 0x40;
}

enum SyntaxKind {
  option allow_alias = true;

  UnspecifiedSyntaxKind = 0;
  Comment = 1;
  PunctuationDelimiter = 2;
  PunctuationBracket = 3;
  Keyword = 4;
  IdentifierKeyword = 4 [deprecated = true];
  IdentifierOperator = 5;
  Identifier = 6;
  IdentifierBuiltin = 7;
  IdentifierNull = 8;
  IdentifierConstant = 9;
  IdentifierMutableGlobal = 10;
  IdentifierParameter = 11;
  IdentifierLocal = 12;
  IdentifierShadowed = 13;
  IdentifierNamespace = 14;
  IdentifierModule = 14 [deprecated = true];
  IdentifierFunction = 15;
  IdentifierFunctionDefinition = 16;
  IdentifierMacro = 17;
  IdentifierMacroDefinition = 18;
  IdentifierType = 19;
  IdentifierBuiltinType = 20;
  IdentifierAttribute = 21;
  RegexEscape = 22;
  RegexRepeated = 23;
  RegexWildcard = 24;
  RegexDelimiter = 25;
  RegexJoin = 26;
  StringLiteral = 27;
  StringLiteralEscape = 28;
  StringLiteralSpecial = 29;
  StringLiteralKey = 30;
  CharacterLiteral = 31;
  NumericLiteral = 32;
  BooleanLiteral = 33;
  Tag = 34;
  TagAttribute = 35;
  TagDelimiter = 36;
}

// Occurrence associates a source position with a symbol and/or highlighting
// information.
message Occurrence {
  // Half-open [start, end) range: `[startLine, startCharacter, endLine,
  // endCharacter]` (four) or `[startLine, startCharacter, endCharacter]` (three;
  // end line inferred). Line/character are 0-based.
  repeated int32 range = 1;
  string symbol = 2;
  int32 symbol_roles = 3;
  repeated string override_documentation = 4;
  SyntaxKind syntax_kind = 5;
  repeated Diagnostic diagnostics = 6;
  repeated int32 enclosing_range = 7;
}

message Diagnostic {
  Severity severity = 1;
  string code = 2;
  string message = 3;
  string source = 4;
  repeated DiagnosticTag tags = 5;
}

enum Severity {
  UnspecifiedSeverity = 0;
  Error = 1;
  Warning = 2;
  Information = 3;
  Hint = 4;
}

enum DiagnosticTag {
  UnspecifiedDiagnosticTag = 0;
  Unnecessary = 1;
  Deprecated = 2;
}

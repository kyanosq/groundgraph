#
# Every candidate must be confirmed or rejected by a human reviewer —
# the `status: proposed` field below means "AI suggestion, not yet
# validated."
schema_version: 1
candidates:
  - id: complete_purchase_unlocks_pro
    name: "Completes an in-app purchase and unlocks Pro for the user"
    description: |
      When the in-app purchase stream emits an update, PaywallScreen
      calls ProNotifier.applyPurchase(productId). If the product id
      matches one of IapProductIds.{monthly,yearly,lifetime},
      ProNotifier flips its `state` to `true`. The entitlement is
      persisted to a Hive box named `pro_entitlement`.
    evidence:
      - dart_method::lib/features/paywall/paywall_screen.dart#PaywallScreen.listenToPurchaseUpdates
      - dart_method::lib/core/settings/pro_provider.dart#ProNotifier.applyPurchase
      - dart_class::lib/core/iap/iap_constants.dart#IapProductIds
      - dart_provider::lib/core/settings/pro_provider.dart#proProvider
      - storage::hive::pro_entitlement
      - route::/paywall_thanks
    confidence: 0.72
    open_questions:
      - "Is the purchase receipt validated server-side before applyPurchase flips state to true?"
      - "Does Hive persistence happen atomically with the in-memory state change, or could a crash desync them?"
      - "Should completing a purchase also dismiss the paywall on every route, not just the /paywall_thanks confirmation route?"
    status: proposed

  - id: restore_purchases_is_incomplete
    name: "Restore Purchases path is declared but does not actually restore"
    description: |
      ProNotifier.restorePurchases() exists but has an empty body — no
      call to the platform's restorePurchases API, no Hive read, no
      state mutation. Any user who reinstalls or switches devices will
      lose their Pro entitlement until they pay again.
    evidence:
      - dart_method::lib/core/settings/pro_provider.dart#ProNotifier.restorePurchases
    confidence: 0.88
    open_questions:
      - "Is restoration handled elsewhere (e.g. on app start by reading Hive)?"
      - "Should this surface a 'no purchase found' UI when the platform reports nothing to restore?"
    status: proposed

  - id: missing_subscription_expiry_check
    name: "Subscription product ids treated identically to lifetime — no expiry awareness"
    description: |
      ProNotifier.applyPurchase grants Pro by setting `state = true` for
      ANY product id in IapProductIds.all, including the monthly and
      yearly subscription tiers. There is no timer, no expiry stamp
      persisted alongside the entitlement, and no recurring re-check —
      so a one-time monthly purchase will keep the user marked as Pro
      forever once written to Hive.
    evidence:
      - dart_method::lib/core/settings/pro_provider.dart#ProNotifier.applyPurchase
      - dart_class::lib/core/iap/iap_constants.dart#IapProductIds
      - storage::hive::pro_entitlement
    confidence: 0.81
    open_questions:
      - "Is there a server-side subscription state refresh on app launch that this graph doesn't capture?"
      - "Should `IapProductIds.monthly` / `.yearly` write a separate `pro_expires_at` key into Hive?"
    status: proposed

  - id: purchase_stream_listener_lifecycle
    name: "Purchase stream subscription is created but never cancelled"
    description: |
      PaywallScreen.listenToPurchaseUpdates registers a Stream listener
      on PurchaseStream.updates but the returned StreamSubscription is
      discarded. If listenToPurchaseUpdates runs more than once during
      the screen's lifecycle, each call adds another listener and the
      old ones leak — potentially causing duplicate applyPurchase
      calls per update.
    evidence:
      - dart_method::lib/features/paywall/paywall_screen.dart#PaywallScreen.listenToPurchaseUpdates
      - dart_class::lib/features/paywall/paywall_screen.dart#PurchaseStream
    confidence: 0.74
    open_questions:
      - "Is listenToPurchaseUpdates only invoked once per screen mount?"
      - "Should the StreamSubscription be cancelled in a `dispose()` hook (which currently does not exist on PaywallScreen)?"
    status: proposed

  - id: paywall_thanks_route_is_unverified
    name: "Navigation to /paywall_thanks happens on every stream event"
    description: |
      Every call to listenToPurchaseUpdates pushes the /paywall_thanks
      route via context.push, regardless of whether the purchase
      succeeded or whether the user dismissed the paywall earlier.
      Combined with the missing subscription cancellation above, this
      could route the user to the thanks screen multiple times for a
      single purchase, or even for failed/refunded events.
    evidence:
      - dart_method::lib/features/paywall/paywall_screen.dart#PaywallScreen.listenToPurchaseUpdates
      - route::/paywall_thanks
    confidence: 0.68
    open_questions:
      - "Should this be gated on `purchaseUpdate.status == PurchaseStatus.purchased` (not modelled in this fixture)?"
      - "Does /paywall_thanks have an idempotency mechanism upstream?"
    status: proposed

  - id: editor_persists_last_tool_to_hive
    name: "Editor remembers the last selected tool across launches"
    description: |
      EditorController.applyTool opens the Hive box `editor_state` and
      writes the active EditorTool to the `lastTool` key. The same key
      is the source of truth read on next launch (caller-side, not in
      this fixture) so the user resumes editing with their previous
      brush/eraser selection.
    evidence:
      - dart_method::lib/features/editor/editor_controller.dart#EditorController.applyTool
      - storage::hive::editor_state
    confidence: 0.78
    risks:
      - "If applyTool throws between writing to Hive and pushing the new state, the persisted tool can drift from the in-memory one."
    recommendation: "Wrap the persistence and state mutation in a single try/catch so the Hive write only happens after the in-memory swap succeeds."
    open_questions:
      - "Is the EditorTool enum string format stable across versions, or could a rename invalidate persisted values?"
    status: proposed

  - id: layer_repository_persists_count_only
    name: "Layer repository only persists the layer count, not individual layers"
    description: |
      LayerRepository._persist writes `count` to the `project_layers`
      Hive box but never serialises layer ids, names or visibility.
      Effectively the persisted state is "how many layers existed",
      which means a restart can't actually restore the layer list.
    evidence:
      - dart_method::lib/features/layers/layer_repository.dart#LayerRepository._persist
      - storage::hive::project_layers
    confidence: 0.86
    risks:
      - "User loses all layer metadata between sessions despite UI implying persistence."
    recommendation: "Persist a list of layer dictionaries instead of just the count, and add a hydrate() method on app start."
    open_questions:
      - "Is layer data persisted elsewhere (e.g. inside the project file itself)?"
    status: proposed

  - id: project_autosave_subscription_leak
    name: "Project autosave listener is never cancelled"
    description: |
      ProjectLifecycle.subscribeAutosave attaches a listener to
      ProjectEventBus.events but discards the StreamSubscription.
      Combined with closeProject not unsubscribing, repeated
      open/close cycles leak listeners and cause duplicate saveProject
      calls per event.
    evidence:
      - dart_method::lib/features/project/project_lifecycle.dart#ProjectLifecycle.subscribeAutosave
      - dart_method::lib/features/project/project_lifecycle.dart#ProjectLifecycle.closeProject
    confidence: 0.71
    risks:
      - "Multiple concurrent saves for the same event amplify Hive I/O and may corrupt last-write-wins state."
    recommendation: "Store the StreamSubscription and cancel it inside closeProject (or expose a disposeAutosave hook)."
    open_questions:
      - "How many times can subscribeAutosave be called for a single ProjectLifecycle instance?"
    status: proposed

  - id: project_lifecycle_persistence_layout
    name: "Projects + last-closed marker share the same Hive box"
    description: |
      createProject, saveProject and closeProject all open the same
      `projects` Hive box. closeProject writes a `lastClosed`
      meta-key alongside the project entries, so a future scan that
      iterates project ids will surface 'lastClosed' as if it were a
      project name.
    evidence:
      - dart_method::lib/features/project/project_lifecycle.dart#ProjectLifecycle.createProject
      - dart_method::lib/features/project/project_lifecycle.dart#ProjectLifecycle.closeProject
      - storage::hive::projects
    confidence: 0.69
    risks:
      - "Meta-keys mixed with data keys produce surprises for any later iteration / migration."
    recommendation: "Move `lastClosed` to a dedicated `projects_meta` box or namespace the key (e.g. `__lastClosed__`)."
    open_questions:
      - "Is there an existing convention for meta-keys (prefix? separate box?) elsewhere in the app?"
    status: proposed
